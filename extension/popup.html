<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Drive Preview Link Copier</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        width: 280px;
        margin: 0;
        padding: 10px;
        color: #1f1f1f;
        background: #fff;
      }

      button {
        width: 100%;
        min-height: 38px;
        box-sizing: border-box;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        padding: 8px 10px;
        color: #1f1f1f;
        background: #f6f8fa;
        font: inherit;
        text-align: left;
        cursor: pointer;
      }

      button:hover {
        background: #eef1f4;
      }

      button:disabled {
        cursor: default;
        opacity: 0.7;
      }

      #status {
        min-height: 18px;
        margin-top: 8px;
        color: #5f6368;
        font-size: 12px;
        line-height: 1.5;
      }

      #status.error {
        color: #b3261e;
      }

      #status.success {
        color: #137333;
      }
    </style>
  </head>
  <body>
    <button id="convertClipboard" type="button">
      Convert clipboard link to preview link
    </button>
    <div id="status" role="status" aria-live="polite"></div>
    <script src="i18n.js"></script>
    <script src="popup.js"></script>
  </body>
</html>
