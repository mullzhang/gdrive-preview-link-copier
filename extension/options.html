<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <title>Drive Preview Link Copier Settings</title>
    <style>
      :root {
        color-scheme: light;
        font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }

      body {
        width: 320px;
        margin: 0;
        padding: 16px;
        color: #1f1f1f;
        background: #fff;
      }

      h1 {
        margin: 0 0 16px;
        font-size: 16px;
        font-weight: 600;
      }

      label {
        display: block;
        margin-bottom: 6px;
        font-size: 13px;
        font-weight: 500;
      }

      select {
        width: 100%;
        box-sizing: border-box;
        border: 1px solid #d0d7de;
        border-radius: 6px;
        padding: 8px;
        color: #1f1f1f;
        background: #fff;
        font: inherit;
      }

      #status {
        min-height: 18px;
        margin-top: 10px;
        color: #137333;
        font-size: 12px;
        line-height: 1.5;
      }
    </style>
  </head>
  <body>
    <h1 id="title">Drive Preview Link Copier Settings</h1>
    <label id="languageLabel" for="language">Language</label>
    <select id="language">
      <option value="en">English</option>
      <option value="ja">Japanese</option>
    </select>
    <div id="status" role="status" aria-live="polite"></div>
    <script src="i18n.js"></script>
    <script src="options.js"></script>
  </body>
</html>
